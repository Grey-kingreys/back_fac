# docker-compose.yml — Gestion Intégrée Multi-Sites (gestion_backend)
# Stack complète : Django + PostgreSQL + Redis + LGTM (Loki, Grafana, Mimir, Tempo)
#
# PORTS — décalés pour coexister avec le projet restaurant sur la même machine :
#   PostgreSQL  : 5433  (restaurant=5432)
#   Redis       : 6380  (restaurant=6379)
#   Backend     : 8001  (restaurant=8000)
#   Loki        : 3101  (restaurant=3100)
#   Mimir       : 9010  (restaurant=9009)
#   Prometheus  : 9091  (restaurant=9090)
#   cAdvisor    : 8082  (restaurant=8080)
#   Tempo HTTP  : 3201  (restaurant=3200)
#   Tempo OTLP  : 4319  (restaurant=4317)
#   Tempo OTLP  : 4320  (restaurant=4318)
#   Grafana     : 3001  (restaurant=3000)
#
# Usage dev :
#   docker compose up --build
#   docker compose exec backend python manage.py createsuperuser
#   docker compose exec backend python manage.py loaddata companies users zones_depots

# Ancre YAML — logging Loki pour tous les services
x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3101/loki/api/v1/push"
    loki-retries: "3"
    loki-batch-size: "400"

services:

  # ── Base de données ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gestion_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gestion_multisites}
      POSTGRES_USER: ${DB_USER:-back_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - gestion_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-back_user} -d ${DB_NAME:-gestion_multisites}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *loki-logging

  # ── Redis (blacklist JWT tokens) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gestion_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *loki-logging

  # ── Backend Django ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_backend
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - OTEL_SERVICE_NAME=gestion-backend
    volumes:
      - .:/app
      - gestion_media_files:/app/media
      - gestion_static_files:/app/staticfiles
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000
    logging: *loki-logging

  # ── Loki — Agrégation des logs ────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: gestion_loki
    restart: unless-stopped
    ports:
      - "3101:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - gestion_loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mimir — Stockage métriques long terme ─────────────────────────────
  mimir:
    image: grafana/mimir:2.12.0
    container_name: gestion_mimir
    restart: unless-stopped
    ports:
      - "9010:9009"
    volumes:
      - ./docker/mimir/mimir-config.yaml:/etc/mimir/mimir-config.yaml:ro
      - gestion_mimir_data:/mimir
    command: -config.file=/etc/mimir/mimir-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:9009/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── cAdvisor — Métriques système des containers ───────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: gestion_cadvisor
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    logging: *loki-logging

  # ── Prometheus — Collecte des métriques Django ─────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: gestion_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - gestion_prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle
    depends_on:
      mimir:
        condition: service_healthy
      backend:
        condition: service_started
    logging: *loki-logging

  # ── Tempo — Distributed Tracing ───────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.1
    container_name: gestion_tempo
    restart: unless-stopped
    ports:
      - "3201:3200"   # API Tempo / Grafana
      - "4319:4317"   # OTLP gRPC
      - "4320:4318"   # OTLP HTTP ← Django envoie ici (via réseau interne port 4318)
    volumes:
      - ./docker/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - gestion_tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo-config.yaml
    depends_on:
      mimir:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Grafana — Dashboard de visualisation ──────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: gestion_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_LEVEL=warn
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - gestion_grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy

# Volumes nommés avec préfixe "gestion_" pour isoler du projet restaurant
volumes:
  gestion_postgres_data:
  gestion_media_files:
  gestion_static_files:
  gestion_loki_data:
  gestion_grafana_data:
  gestion_mimir_data:
  gestion_prometheus_data:
  gestion_tempo_data: