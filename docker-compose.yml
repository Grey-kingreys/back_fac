# docker-compose.yml — Gestion Intégrée Multi-Sites (gestion_backend)
# Stack complète : Django + PostgreSQL + Redis + LGMT (Loki, Grafana, Mimir, Tempo)
#
# Usage dev :
#   docker compose up --build
#   docker compose exec backend python manage.py createsuperuser
#   docker compose exec backend python manage.py loaddata companies users zones_depots

# x-loki-logging: &loki-logging
#   driver: loki
#   options:
#     loki-url: "http://loki:3100/loki/api/v1/push"
#     loki-retries: "3"
#     loki-batch-size: "400"

services:
 
  # ── Base de données ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gestion_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gestion_multisites}
      POSTGRES_USER: ${DB_USER:-back_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-back_user} -d ${DB_NAME:-gestion_multisites}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ── Redis (blacklist JWT tokens) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gestion_redis
    restart: unless-stopped
    ports:
      - "6380:6379"   # Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ── Backend Django ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_backend
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8001:8000"   # Backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  
  

