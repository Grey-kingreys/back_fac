# docker-compose.yml — Gestion Intégrée Multi-Sites (PRODUCTION)
# Django (gunicorn) + PostgreSQL + Redis + Caddy (reverse proxy + HTTPS auto)
# Stack LGTM (Loki, Grafana, Mimir, Tempo, Prometheus, cAdvisor) laissée
# COMMENTÉE — à décommenter pour le build local / observabilité.
#
# PORTS — décalés pour coexister avec le projet restaurant sur la même machine :
#   PostgreSQL  : 5433  (restaurant=5432)
#   Redis       : 6380  (restaurant=6379)
#   Backend     : 8001  (restaurant=8000)   [en prod : non exposé, servi via Caddy]
#   Loki        : 3101  (restaurant=3100)
#   Mimir       : 9010  (restaurant=9009)
#   Prometheus  : 9091  (restaurant=9090)
#   cAdvisor    : 8082  (restaurant=8080)
#   Tempo HTTP  : 3201  (restaurant=3200)
#   Tempo OTLP  : 4319  (restaurant=4317)
#   Tempo OTLP  : 4320  (restaurant=4318)
#   Grafana     : 3001  (restaurant=3000)
#
# Usage local (observabilité) : décommenter l'ancre x-loki-logging + la stack LGTM
# Usage prod  : docker compose up -d --build
# Migrations / collectstatic : gérés par docker/entrypoint.sh (ENTRYPOINT du Dockerfile)

# Ancre YAML — logging Loki pour tous les services
# x-loki-logging: &loki-logging
#   driver: loki
#   options:
#     loki-url: "http://localhost:3101/loki/api/v1/push"
#     loki-retries: "3"
#     loki-batch-size: "400"

services:

  # ── Base de données (privée, non exposée à Internet) ──────────────────
  db:
    image: postgres:16-alpine
    container_name: gestion_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gestion_multisites}
      POSTGRES_USER: ${DB_USER:-back_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gestion_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"   # accessible uniquement en local (SSH tunnel pour debug)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-back_user} -d ${DB_NAME:-gestion_multisites}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # logging: *loki-logging

  # ── Redis (privé, non exposé) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gestion_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # logging: *loki-logging

  # ── Backend Django (gunicorn — lancé par le Dockerfile) ───────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379/0
      # OTEL désactivé tant que la stack LGTM est commentée (décommenter pour local)
      # - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      # - OTEL_SERVICE_NAME=gestion-backend
    volumes:
      - gestion_media_files:/app/media
      - gestion_static_files:/app/staticfiles
    expose:
      - "8000"   # interne au réseau Docker, Caddy y accède — pas exposé à l'hôte
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # logging: *loki-logging

