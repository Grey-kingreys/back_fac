  # ── Caddy — reverse proxy + HTTPS automatique (Let's Encrypt) ─────────
  caddy:
    image: caddy:2-alpine
    container_name: gestion_caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - gestion_static_files:/srv/static:ro
      - gestion_media_files:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

# Volumes nommés avec préfixe "gestion_" pour isoler du projet restaurant
volumes:
  gestion_postgres_data:
  gestion_media_files:
  gestion_static_files:
  caddy_data:
  caddy_config:
