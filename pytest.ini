# ─────────────────────────────────────────────
# Configuration pytest
# À placer à la racine de gestion_backend/
# ─────────────────────────────────────────────

[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -v
    -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning