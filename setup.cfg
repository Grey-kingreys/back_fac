# ─────────────────────────────────────────────
# Configuration flake8 et isort
# À placer à la racine de gestion_backend/
# ─────────────────────────────────────────────

[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    migrations,
    venv,
    .venv,
    *.egg-info
# Ignorer les warnings courants Django
ignore =
    # ligne trop longue dans les migrations (auto-générées)
    E501,
    # import non utilisé dans __init__.py
    F401

[isort]
profile = black
line_length = 120
skip = migrations, venv, .venv
known_django = django
known_third_party = rest_framework, jwt
sections = FUTURE, STDLIB, DJANGO, THIRDPARTY, FIRSTPARTY, LOCALFOLDER